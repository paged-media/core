[package]
name = "paged-mutate"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Operation-based mutation channel for the Paged scene graph. Typed, serializable, invertible Operations + undo/redo + change notification. Consumed by paged-introspect."

[lints]
workspace = true

[dependencies]
paged-model = { path = "../paged-model" }
paged-scene = { path = "../paged-scene" }
serde = { workspace = true }
# Lossless style-delete undo serialises the captured StyleDef to JSON
# (the def is Serialize+Deserialize) and restores it verbatim.
serde_json = "1"
thiserror = { workspace = true }
tsify-next = { workspace = true }
wasm-bindgen = { workspace = true }
# Curve-preserving Bezier CSG for Pathfinder ops + foundation for
# future curve-based features (offset / outline-stroke / curve
# simplification). See path_math::bezier_conv for the
# PathAnchor ↔ SimpleBezierPath converters.
kurbo = "0.11.3"
flo_curves = "=0.8.0"

[dev-dependencies]
paged-renderer = { path = "../paged-renderer" }
paged-compose = { path = "../paged-compose" }
bytes = { workspace = true }
# W1.16 — the anchored-object round-trip test builds an in-memory IDML
# package (anchored frame nested in a story) to drive `Document::open`.
zip = { workspace = true }

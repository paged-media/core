[package]
name = "paged-renderer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Top-level renderer coordinator. The public Rust API surface."

[lints]
workspace = true

[features]
default = ["cpu", "mutate-roundtrip"]
# The `--mutate-roundtrip` conformance hook on the paged-inspect bin.
# OPTIONAL because paged-mutate is an editor crate: the paged-sdk wasm
# (renderer-core only, default-features = false) must never link it —
# the publish-wasm subset audit enforces that boundary.
mutate-roundtrip = ["dep:paged-mutate"]
# Pulls in the CPU rasterizer so `render()` is callable. Disabling this
# leaves only `build()` — useful for WASM builds that rely on a
# different backend. `image` is now a non-optional dep because
# the pipeline decodes placed-image bytes at build_document time.
cpu = ["paged-gpu/cpu"]

[[bin]]
name = "paged-inspect"
path = "src/bin/inspect.rs"
required-features = ["cpu", "mutate-roundtrip"]

[[test]]
name = "inspect_e2e"
required-features = ["mutate-roundtrip"]

[dependencies]
paged-model = { path = "../paged-model" }
paged-scene = { path = "../paged-scene" }
paged-flow = { path = "../paged-flow" }
paged-text = { path = "../paged-text" }
paged-color = { path = "../paged-color" }
paged-compose = { path = "../paged-compose" }
paged-gpu = { path = "../paged-gpu", default-features = false }
# W3.B2 — IDML save-back, used by the `paged-inspect --roundtrip`
# conformance hook. Lightweight (paged-parse + paged-scene + zip +
# quick-xml, all already in the dep graph), no native-only deps.
paged-write = { path = "../paged-write" }
# W4.14 — the operation surface, used by the `paged-inspect
# --mutate-roundtrip` conformance hook (the bin applies one typed
# Operation, saves, and re-verifies it survived). paged-mutate carries
# paged-renderer only as a DEV-dependency, so this regular edge plus its
# dev edge form a dev-only cycle Cargo tolerates.
paged-mutate = { path = "../paged-mutate", optional = true }
# Used by the `paged-inspect --roundtrip` per-entry byte-identity tally
# to walk the re-zipped package. Same wasm-clean config the rest of the
# tree reads zips with.
zip = { workspace = true }
anyhow = { workspace = true }
bytes = { workspace = true }
clap = { version = "4", features = ["derive"] }
rustybuzz = "0.18"
ttf-parser = "0.24"
serde = { workspace = true }
serde_json = "1"
tsify-next = { workspace = true }
wasm-bindgen = { workspace = true }
image = { workspace = true }
jpeg-decoder = "0.3"
# PNG iCCP inflation for the export-time ICC extraction (already a
# transitive dep via the image crate's PNG decoder).
flate2 = "1"
# SVG rasterization. Pure-Rust, compiles on wasm32. We disable the
# system-fonts / memmap-fonts features (browser sandbox can't read
# system fonts; we'd serve them through the renderer's font resolver
# if a placed SVG needed text — most IDML-embedded SVGs are pure
# vector graphics like icons + logos).
resvg = { version = "0.45", default-features = false, features = ["text"] }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[dev-dependencies]
paged-fidelity = { path = "../paged-fidelity" }
paged-flow = { path = "../paged-flow" }
# C1-in-code test (tests/c1_no_idml.rs) drives the neutral render pipeline
# (flow -> SceneLayer -> DisplayList -> raster) directly, with no IDML.
paged-compose = { path = "../paged-compose" }
paged-gpu = { path = "../paged-gpu", features = ["cpu"] }
paged-gen = { path = "../paged-gen" }
image = { workspace = true }
zip = { workspace = true }
tempfile = "3"
serde_json = "1"
# Used by the anchored emission test to read the test font's real
# cap-height / x-height / ascent / descent so the vertical-reference
# assertions track the metrics instead of baked magic numbers.
ttf-parser = "0.24"

name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: check + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  wasm-size:
    name: wasm-size gate (Spike C)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install binaryen + brotli
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen brotli
      - name: measure
        run: ./spikes/wasm-size/measure.sh
      - name: enforce 3.5 MB budget
        run: |
          SIZE=$(stat -c '%s' spikes/wasm-size/out/spike_wasm_size.opt.wasm.br)
          echo "compressed size: $SIZE bytes"
          if [ "$SIZE" -gt 3670016 ]; then
            echo "::error::WASM compressed size $SIZE exceeds 3.5 MB budget"
            exit 1
          fi

name: fidelity

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'crates/**'
      - 'corpus/**'
      - '.github/workflows/fidelity.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Resolve the pinned toolchain from rust-toolchain.toml (audit B21) so
  # this workflow installs the same version as ci.yml instead of `@stable`.
  toolchain:
    name: resolve pinned toolchain
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.pin.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
      - id: pin
        run: echo "channel=$(bash scripts/rust-channel.sh)" >> "$GITHUB_OUTPUT"

  corpus:
    name: corpus diff (${{ matrix.os }})
    needs: toolchain
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          # Pinned from rust-toolchain.toml via the toolchain job (B21).
          toolchain: ${{ needs.toolchain.outputs.channel }}
      - uses: Swatinem/rust-cache@v2

      - name: install poppler-utils (pdftoppm) — Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils

      - name: install poppler (pdftoppm) — macOS
        if: runner.os == 'macOS'
        run: brew list poppler >/dev/null 2>&1 || brew install poppler

      - name: build paged-diff + paged-inspect + paged-gen
        run: cargo build --release
             -p paged-fidelity --bin paged-diff
             -p paged-renderer --bin paged-inspect
             -p paged-gen --bin paged-gen

      - name: golden-snapshot regression gate
        # Renders the seed_hello fixture and ΔE-diffs every page
        # against the pinned PNGs in corpus/seeds/hello/golden/.
        # Drift past the test's epsilon fails the run.
        run: cargo test -p paged-renderer --test seed_hello seed_hello_matches_golden_snapshot

      - name: generated-corpus fidelity gate (hard)
        # Hard regression gate over corpus/generated/*.idml + *.pdf.
        # diff.sh regenerates each IDML, renders it, rasterises the
        # paired InDesign PDF via pdftoppm, runs paged-diff, and
        # asserts every gated page stays under the per-fixture
        # tolerances in corpus/generated/fidelity-thresholds.json.
        # Failure here blocks the merge.
        run: ./corpus/generated/diff.sh

      - name: upload generated-corpus heatmaps on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-corpus-diff-${{ matrix.os }}
          # cand-NNN.png + ref-NNN.png + heat-NNN.png + report.json +
          # gate.json per fixture — enough to triage any regression.
          path: /tmp/idml-generated-diff
          if-no-files-found: warn
          retention-days: 14

      - name: third-party sample diff (advisory)
        # Runs ./corpus/samples/diff.sh against any third-party
        # IDML pair (idml + matching pdf) under corpus/samples/.
        # Those files are gitignored and only present when a dev
        # has staged one locally; CI no-ops when none exist.
        # Intentionally `|| true` — these aren't license-cleared
        # for redistribution and the per-page numbers gate nothing
        # automatically. Useful as an artifact for inspection.
        run: |
          shopt -s nullglob
          for idml in corpus/samples/*.idml; do
            name=$(basename "$idml" .idml)
            pdf="corpus/samples/$name.pdf"
            [ -f "$pdf" ] || continue
            echo "==> diff for $name"
            ./corpus/samples/diff.sh "$name" || true
          done

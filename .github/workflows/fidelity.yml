name: fidelity

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'crates/**'
      - 'corpus/**'
      - '.github/workflows/fidelity.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  corpus:
    name: corpus diff (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: build idml-diff
        run: cargo build --release -p idml-fidelity --bin idml-diff

      - name: run corpus diff
        # No seed documents yet; this step is a placeholder until Phase 0
        # populates corpus/seeds/. The workflow exists so merges land the
        # expected gate from day one.
        run: |
          if [ -d corpus/seeds ] && find corpus/seeds -name '*.reference.png' | read; then
            for ref in corpus/seeds/**/*.reference.png; do
              cand="${ref%.reference.png}.candidate.png"
              if [ -f "$cand" ]; then
                ./target/release/idml-diff "$ref" "$cand" \
                  --heatmap "${ref%.reference.png}.heatmap.png"
              fi
            done
          else
            echo "no corpus entries yet; skipping"
          fi

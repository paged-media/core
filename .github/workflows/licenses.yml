name: licenses

# Dependency-license + supply-chain audit. The engine is MPL-2.0, so every
# transitive dependency must be permissively licensed (see deny.toml).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # advisories MUST be listed explicitly (audit B22): naming a
          # subset of checks makes cargo-deny run ONLY those, so the prior
          # `licenses bans sources` silently skipped the RUSTSEC advisory
          # scan even though deny.toml has an [advisories] section. All
          # four checks now run: vulnerabilities + license policy +
          # dup/wildcard bans + registry/source allowlist.
          command: check advisories licenses bans sources

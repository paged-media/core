# cargo-deny configuration for the paged engine.
# Run:  cargo deny check          (CI runs `check licenses bans sources`)
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# RUSTSEC advisories: fail on vulnerabilities; add IDs here to ignore
# with a justification once triaged.
# All four below are UNMAINTAINED advisories (not vulnerabilities) — no
# known issue, the crates work. They're allow-listed until the upstream
# tree drops them (the first two are transitive proc-macro deps via the
# wgpu/Vello lineage; tsify-next is the wire-type generator — migrating
# to `tsify` is a tracked follow-up, not a CI blocker). ttf-parser is a
# transitive dep of our SVG lane (resvg → usvg → fontdb → ttf-parser); the
# advisory has "no safe upgrade available" (the recommended `skrifa` swap
# must land upstream in resvg first), so it's allow-listed until then.
ignore = [
    "RUSTSEC-2024-0436", # paste — unmaintained
    "RUSTSEC-2024-0370", # proc-macro-error — unmaintained
    "RUSTSEC-2025-0048", # tsify-next — unmaintained (use tsify)
    "RUSTSEC-2026-0192", # ttf-parser — unmaintained (via resvg; no safe upgrade, awaits upstream skrifa migration)
    "RUSTSEC-2026-0206", # rustybuzz — unmaintained (via resvg/usvg; no safe upgrade available)
]

[licenses]
version = 2
confidence-threshold = 0.9
# The engine is MPL-2.0. Dependencies must be permissively licensed so
# they can be combined into an MPL distribution (this is why MPL was
# chosen over AGPL). Tighten/extend this list as `cargo deny check
# licenses` surfaces the actual transitive set (wgpu, rustybuzz,
# ttf-parser, tiny-skia, Vello, lcms2, …).
allow = [
    "MPL-2.0",
    # Our own workspace crates: dual MPL-2.0 OR PMEL (the Paged Media
    # Engine License; SPDX has no id for it, hence the LicenseRef form).
    "LicenseRef-PMEL",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
]
# Per-crate clarifications for crates whose SPDX can't be auto-detected
# (e.g. ring, some font/ICC bindings). Add entries here as needed.
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Vello (the GPU/wgpu rasteriser backend) is consumed as a pinned git
# tag — the pinned revision has no crates.io release.
#
# plugin-publish hosts the IDML adapter (idml-import/idml-export), extracted
# out of the engine (N10.2 / ADR-022). The engine git-deps it back at a
# pinned rev; it is a public paged-media repo with no crates.io release.
allow-git = [
    "https://github.com/linebender/vello.git",
    "https://github.com/paged-media/plugin-publish",
]
